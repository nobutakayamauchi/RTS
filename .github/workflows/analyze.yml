name: RTS Sentinel Analyze

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: rts-sentinel-analyze-main
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -------------------------------
      # Checkout
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # Python
      # -------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (safe empty)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      # -------------------------------
      # Session month/day (UTC)
      # -------------------------------
      - name: Set session month + day (UTC)
        run: |
          echo "SESSION_MONTH=$(date -u +%Y-%m)" >> $GITHUB_ENV
          echo "SESSION_DAY=$(date -u +%Y%m%d)" >> $GITHUB_ENV

      # -------------------------------
      # RTS Analysis
      # -------------------------------
      - name: Run RTS Evidence Analysis
        run: |
          python scripts/rts_analysis_engine.py

      - name: Run RTS Agent Analyze
        run: |
          python scripts/rts_agent_analyze.py

      # -------------------------------
      # Commit analysis results (if changed) — keep as-is
      # -------------------------------
      - name: Commit analysis results (if changed)
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add analysis/ || true

          if git diff --cached --quiet; then
            echo "No analysis changes."
            exit 0
          fi

          git commit -m "RTS automated analysis update" || true

          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "push ok"
              exit 0
            fi
            echo "push failed, retry..."
            sleep 2
          done

          echo "push failed after retries"
          exit 1

      # -------------------------------
      # Build session event payload (ALWAYS) — include actual job status
      # -------------------------------
      - name: Build session event payload
        if: always()
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          HEAD_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python - <<'PY'
          import json, os, datetime
          ts = datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
          run_id = os.environ["RUN_ID"]
          repo = os.environ["REPO"]
          payload = {
            "ts": ts,
            "kind": "sentinel.run",
            "workflow": os.environ.get("WORKFLOW_NAME", "RTS Sentinel Analyze"),
            "run_id": str(run_id),
            "run_number": int(os.environ.get("RUN_NUMBER", "0") or 0),
            "run_attempt": int(os.environ.get("RUN_ATTEMPT", "1") or 1),
            "status": (os.environ.get("JOB_STATUS", "") or "").lower(),  # success/failure/cancelled
            "commit": os.environ.get("HEAD_SHA", ""),
            "actor": os.environ.get("ACTOR", ""),
            "repo": repo,
            "ref": os.environ.get("REF_NAME", ""),
            "run_url": f'{os.environ.get("SERVER_URL","https://github.com")}/{repo}/actions/runs/{run_id}',
            "note": "analysis updated",
          }
          with open("/tmp/session_payload.json", "w", encoding="utf-8") as f:
            json.dump(payload, f, ensure_ascii=False, indent=2)
          print("wrote /tmp/session_payload.json")
          PY
          cat /tmp/session_payload.json

      # -------------------------------
      # Append session ledger (NEW API)
      # -------------------------------
      - name: Append session ledger
        if: always()
        run: |
          python scripts/session_append.py "${SESSION_MONTH}" "/tmp/session_payload.json"

      # -------------------------------
      # Rollup monthly index (do not swallow real errors)
      # -------------------------------
      - name: Rollup monthly index
        if: always()
        run: |
          python scripts/session_rollup.py "${SESSION_MONTH}" "${SESSION_DAY}"

      # -------------------------------
      # Raw logs -> Artifact (not git)
      # -------------------------------
      - name: Pack raw session logs
        if: always()
        continue-on-error: true
        run: |
          python scripts/session_artifact_pack.py "${SESSION_MONTH}" || true

      - name: Detect packed artifact
        if: always()
        id: detect_artifact
        run: |
          if ls "sessions/${SESSION_MONTH}/raw_session_"*.zip >/dev/null 2>&1; then
            echo "HAS_SESSION_ARTIFACT=true" >> $GITHUB_ENV
          else
            echo "HAS_SESSION_ARTIFACT=false" >> $GITHUB_ENV
          fi

      - name: Upload raw session artifact
        if: always() && env.HAS_SESSION_ARTIFACT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rts-session-raw-${{ env.SESSION_MONTH }}
          path: sessions/${{ env.SESSION_MONTH }}/raw_session_*.zip
          if-no-files-found: ignore
          retention-days: 14

      # -------------------------------
      # Commit sessions/ indexes (human-first)
      # -------------------------------
      - name: Commit session outputs (if changed)
        if: always()
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add "sessions/${SESSION_MONTH}/" || true
          git add "incidents/evidence_snapshots/" || true

          if git diff --cached --quiet; then
            echo "No session changes."
            exit 0
          fi

          git commit -m "RTS: session ledger update (${SESSION_MONTH})" || true

          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "push ok"
              exit 0
            fi
            echo "push failed, retry..."
            sleep 2
          done

          echo "push failed after retries"
          exit 1
