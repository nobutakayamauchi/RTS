name: RTS Sentinel Analyze

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"
workflow_dispatch:
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Sentinel Analyze
        run: python scripts/analyze.py

      - name: Commit Sentinel Report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analyze/index.md
          git diff --cached --quiet || git commit -m "chore: update sentinel analyze report"
          git push
