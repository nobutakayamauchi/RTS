name: RTS Analyze Auto

on:
  push:
    paths:
      - "logs/**"
      - "incidents/**"
      - "memory/**"
      - "scripts/analyze.py"

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Analyze
        run: |
          python scripts/analyze.py

      - name: Commit Analyze Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add analyze/index.md

          git diff --cached --quiet || git commit -m "RTS Auto Analyze Update"

          git push
