name: RTS Sentinel Analyze

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:

      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------
      # Install deps (safe empty)
      # -----------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      # -----------------------------
      # RTS Evidence Analyze
      # -----------------------------
      - name: Run RTS Evidence Analysis
        run: |
          python scripts/rts_analysis_engine.py

      # -----------------------------
      # RTS Agent Path Analyze ⭐ NEW
      # -----------------------------
      - name: Run RTS Agent Analyze
        run: |
          python scripts/rts_agent_analyze.py

      # -----------------------------
      # Commit auto generated files
      # -----------------------------
      - name: Commit analysis results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add analysis/

          git diff --cached --quiet || git commit -m "RTS automated analysis update"

          git push
