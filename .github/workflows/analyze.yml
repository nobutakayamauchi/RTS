name: RTS Sentinel Analyze

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:

      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Python
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      # -----------------------------
      # Core Analysis
      # -----------------------------
      - name: Run RTS Evidence Analysis
        run: |
          python scripts/rts_analysis_engine.py

      - name: Run RTS Agent Analyze
        run: |
          python scripts/rts_agent_analyze.py

      # -----------------------------
      # Session Ledger Append
      # -----------------------------
      - name: Build session event payload
        run: |
          python scripts/session_append.py

      - name: Update checksums
        run: |
          if ls sessions/*/session_*.jsonl 1> /dev/null 2>&1; then
            find sessions -name "session_*.jsonl" -exec sha256sum {} \; > sessions/$(date -u +%Y-%m)/checksums.sha256
          fi

      # -----------------------------
      # Rollup (Proof page generation)
      # -----------------------------
      - name: Set session month
        id: month
        run: |
          echo "SESSION_MONTH=$(date -u +%Y-%m)" >> $GITHUB_ENV

      - name: Rollup monthly index
        run: |
          python scripts/session_rollup.py "$SESSION_MONTH"

      # -----------------------------
      # Pack raw logs as artifact
      # -----------------------------
      - name: Pack raw session logs
        run: |
          mkdir -p artifact
          if ls sessions/$SESSION_MONTH/session_*.jsonl 1> /dev/null 2>&1; then
            tar -czf artifact/rts-sessions-$SESSION_MONTH.tar.gz sessions/$SESSION_MONTH/session_*.jsonl
          fi

      - name: Upload raw session artifact
        uses: actions/upload-artifact@v4
        with:
          name: rts-sessions-${{ env.SESSION_MONTH }}
          path: artifact/

      # -----------------------------
      # Commit generated files
      # -----------------------------
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add sessions/
          git add analysis/

          git diff --cached --quiet || git commit -m "RTS: automated analysis + session rollup"

          git pull --rebase origin main || true
          git push
