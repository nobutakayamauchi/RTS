name: RTS Sentinel Analyze

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: rts-sentinel-analyze-main
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # Python
      # -------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (safe empty)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      # -------------------------
      # RTS Analysis (existing)
      # -------------------------
      - name: Run RTS Evidence Analysis
        run: |
          python scripts/rts_analysis_engine.py

      - name: Run RTS Agent Analyze
        run: |
          python scripts/rts_agent_analyze.py

      - name: Commit analysis results (analysis/)
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add analysis/ || true
          git diff --cached --quiet && echo "No analysis changes" && exit 0

          git commit -m "RTS automated analysis update"
          git pull --rebase origin main
          git push origin main

      # ============================================================
      # Session ledger (human-first, always)
      # ============================================================

      - name: Set session month + day
        if: always()
        run: |
          echo "SESSION_MONTH=$(date -u +%Y-%m)" >> $GITHUB_ENV
          echo "SESSION_DAY=$(date -u +%Y%m%d)" >> $GITHUB_ENV

      - name: Build session event payload (python)
        if: always()
        env:
          RTS_KIND: "sentinel.run"
          RTS_NOTE: "analysis updated"
          RTS_WORKFLOW: ${{ github.workflow }}
          RTS_RUN_ID: ${{ github.run_id }}
          RTS_RUN_ATTEMPT: ${{ github.run_attempt }}
          RTS_REPO: ${{ github.repository }}
          RTS_REF: ${{ github.ref_name }}
          RTS_ACTOR: ${{ github.actor }}
          RTS_COMMIT: ${{ github.sha }}
          RTS_STATUS: ${{ job.status }}
        run: |
          python scripts/session_payload.py /tmp/session_payload.json
          cat /tmp/session_payload.json

      - name: Append session ledger
        if: always()
        run: |
          python scripts/session_append.py /tmp/session_payload.json

      - name: Detect transitions (butterfly / breakpoints)
        if: always()
        run: |
          python scripts/session_transition.py "$SESSION_MONTH" "$SESSION_DAY"

      - name: Rollup monthly index (sessions/)
        if: always()
        run: |
          python scripts/session_rollup.py "$SESSION_MONTH"

      # -------------------------
      # Raw logs -> Artifact (NOT git)
      # -------------------------
      - name: Pack raw session logs
        if: always()
        continue-on-error: true
        run: |
          python scripts/session_artifact_pack.py "$SESSION_MONTH"

      - name: Detect packed artifact
        if: always()
        run: |
          if ls "sessions/$SESSION_MONTH/"*.tar.gz >/dev/null 2>&1; then
            echo "HAS_SESSION_ARTIFACT=true" >> $GITHUB_ENV
          else
            echo "HAS_SESSION_ARTIFACT=false" >> $GITHUB_ENV
          fi

      - name: Upload raw session artifact
        if: always()
        if: env.HAS_SESSION_ARTIFACT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: rts-session-raw-${{ env.SESSION_MONTH }}-${{ github.run_id }}
          path: sessions/${{ env.SESSION_MONTH }}/*.tar.gz
          if-no-files-found: ignore
          retention-days: 14

      # -------------------------
      # Commit sessions indexes + ledgers (git)
      # -------------------------
      - name: Commit sessions (indexes + ledgers)
        if: always()
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add "sessions/$SESSION_MONTH/" || true

          git diff --cached --quiet && echo "No session changes" && exit 0

          git commit -m "RTS: session ledger update ($SESSION_MONTH)"
          git pull --rebase origin main
          git push origin main
