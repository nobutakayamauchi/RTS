name: RTS Sentinel Analyze

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: rts-sentinel-analyze-main
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (safe)
        run: |
          python -m pip install --upgrade pip
          # requirements が無い運用でも落ちないようにする
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      # ----------------------------
      # RTS Analysis (existing)
      # ----------------------------
      - name: Run RTS Evidence Analysis
        run: |
          python scripts/rts_analysis_engine.py

      - name: Run RTS Agent Analyze
        run: |
          python scripts/rts_agent_analyze.py

      - name: Commit analysis results
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add analysis/ || true
          if git diff --cached --quiet; then
            echo "No analysis changes."
            exit 0
          fi

          git commit -m "RTS automated analysis update"
          git pull --rebase origin main
          git push origin main

      # ----------------------------
      # Session ledger (human-first)
      # ----------------------------
      - name: Set session month
        run: |
          echo "SESSION_MONTH=$(date -u +%Y-%m)" >> "$GITHUB_ENV"

      - name: Build session event payload (json)
        run: |
          cat > /tmp/session_payload.json <<'JSON'
          {
            "ts": "__TS__",
            "kind": "sentinel.run",
            "workflow": "__WORKFLOW__",
            "run_id": "__RUN_ID__",
            "status": "__STATUS__",
            "commit": "__COMMIT__",
            "actor": "__ACTOR__",
            "repo": "__REPO__",
            "ref": "__REF__",
            "note": "analysis updated"
          }
          JSON

          TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sed -i "s/__TS__/${TS}/" /tmp/session_payload.json
          sed -i "s/__WORKFLOW__/RTS Sentinel Analyze/" /tmp/session_payload.json
          sed -i "s/__RUN_ID__/${GITHUB_RUN_ID}/" /tmp/session_payload.json
          sed -i "s/__STATUS__/success/" /tmp/session_payload.json
          sed -i "s/__COMMIT__/${GITHUB_SHA}/" /tmp/session_payload.json
          sed -i "s/__ACTOR__/${GITHUB_ACTOR}/" /tmp/session_payload.json
          sed -i "s#__REPO__#${GITHUB_REPOSITORY}#" /tmp/session_payload.json
          sed -i "s/__REF__/${GITHUB_REF_NAME}/" /tmp/session_payload.json

          cat /tmp/session_payload.json

      - name: Append session ledger
        run: |
          python scripts/session_append.py /tmp/session_payload.json

      - name: Rollup monthly index
        run: |
          python scripts/session_rollup.py "$SESSION_MONTH"

      # ----------------------------
      # Raw logs -> Artifact (not git)
      # ----------------------------
      - name: Pack raw session logs (optional)
        continue-on-error: true
        run: |
          python scripts/session_artifact_pack.py "$SESSION_MONTH"

      - name: Detect packed artifact
        run: |
          if ls "sessions/${SESSION_MONTH}/artifacts/"*.zip >/dev/null 2>&1; then
            echo "HAS_SESSION_ARTIFACT=1" >> "$GITHUB_ENV"
          else
            echo "HAS_SESSION_ARTIFACT=0" >> "$GITHUB_ENV"
          fi

      - name: Upload raw session artifact
        if: env.HAS_SESSION_ARTIFACT == '1'
        uses: actions/upload-artifact@v4
        with:
          name: rts-session-raw-${{ env.SESSION_MONTH }}-${{ github.run_id }}
          path: sessions/${{ env.SESSION_MONTH }}/artifacts/*.zip
          if-no-files-found: ignore
          retention-days: 14

      # ----------------------------
      # Commit sessions/ (indexes + checksums + ledger)
      # ----------------------------
      - name: Commit session index
        run: |
          set -e
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add "sessions/${SESSION_MONTH}/index.md" "sessions/${SESSION_MONTH}/index.json" "sessions/${SESSION_MONTH}/checksums.sha256" || true
          git add sessions/"${SESSION_MONTH}"/session_*.jsonl || true

          if git diff --cached --quiet; then
            echo "No session changes."
            exit 0
          fi

          git commit -m "RTS: session ledger update (${SESSION_MONTH})"
          git pull --rebase origin main
          git push origin main
