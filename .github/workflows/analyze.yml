name: RTS Analyze Auto

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"  # 6時間ごと（好みで変更OK）
  push:
    paths:
      - "logs/**"
      - "incidents/**"
      - "memory/**"
      - "scripts/analyze.py"

permissions:
  contents: write

concurrency:
  group: rts-analyze
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Analyze
        run: |
          python scripts/analyze.py

      - name: Commit Analyze Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"

          git add analyze/index.md

          # 変更がなければ何もしない
          git diff --cached --quiet && exit 0

          # 無限ループ抑止（Actions が作ったコミットは再トリガーされにくくする）
          git commit -m "RTS Auto Analyze Update [skip ci]"
          git push
