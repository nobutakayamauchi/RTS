name: RTS Sentinel Analyze

on:
  push:
    branches: [main]
    paths-ignore:
      - "sessions/**/manifest.sha256"

  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: rts-sentinel-analyze-main
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      - name: Set session month + day (UTC)
        run: |
          echo "SESSION_MONTH=$(date -u +%Y-%m)" >> $GITHUB_ENV
          echo "SESSION_DAY=$(date -u +%Y%m%d)" >> $GITHUB_ENV

      ###################################################
      # RUN START
      ###################################################

      - name: Build RUN_START payload
        if: always()
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          HEAD_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python - <<'PY'
          import json, os, datetime
          ts = datetime.datetime.utcnow().replace(microsecond=0).isoformat()+"Z"
          run_id=os.environ.get("RUN_ID","")
          repo=os.environ.get("REPO","")

          payload={
            "ts":ts,
            "kind":"sentinel.run.start",
            "workflow":os.environ.get("WORKFLOW_NAME",""),
            "run_id":run_id,
            "run_number":int(os.environ.get("RUN_NUMBER","0") or 0),
            "run_attempt":int(os.environ.get("RUN_ATTEMPT","1") or 1),
            "status":"started",
            "commit":os.environ.get("HEAD_SHA",""),
            "actor":os.environ.get("ACTOR",""),
            "repo":repo,
            "ref":os.environ.get("REF_NAME",""),
            "run_url":f'{os.environ.get("SERVER_URL","https://github.com")}/{repo}/actions/runs/{run_id}',
            "note":"run started"
          }

          open("/tmp/session_payload_start.json","w").write(
            json.dumps(payload,ensure_ascii=False,indent=2)
          )
          PY

      - name: Append RUN_START
        if: always()
        run: |
          python scripts/session_append.py "${SESSION_MONTH}" "/tmp/session_payload_start.json"

      ###################################################
      # RTS Engines
      ###################################################

      - name: Run RTS Evidence Analysis
        run: python scripts/rts_analysis_engine.py

      - name: Run RTS Agent Analyze
        run: python scripts/rts_agent_analyze.py

      ###################################################
      # RUN END
      ###################################################

      - name: Build RUN_END payloads
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          HEAD_SHA: ${{ github.sha }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python - <<'PY'
          import json,os,datetime
          ts=datetime.datetime.utcnow().replace(microsecond=0).isoformat()+"Z"

          base={
            "ts":ts,
            "workflow":"RTS Sentinel Analyze",
            "run_id":os.environ.get("RUN_ID",""),
            "run_number":int(os.environ.get("RUN_NUMBER","0") or 0),
            "run_attempt":int(os.environ.get("RUN_ATTEMPT","1") or 1),
            "status":os.environ.get("JOB_STATUS",""),
            "commit":os.environ.get("HEAD_SHA",""),
            "actor":os.environ.get("ACTOR",""),
            "repo":os.environ.get("REPO",""),
            "ref":os.environ.get("REF_NAME",""),
            "note":"analysis finished"
          }

          end=dict(base)
          end["kind"]="sentinel.run.end"

          legacy=dict(base)
          legacy["kind"]="sentinel.run"

          open("/tmp/session_payload_end.json","w").write(
            json.dumps(end,ensure_ascii=False,indent=2)
          )

          open("/tmp/session_payload_legacy.json","w").write(
            json.dumps(legacy,ensure_ascii=False,indent=2)
          )
          PY

      - name: Append RUN_END
        if: always()
        run: python scripts/session_append.py "${SESSION_MONTH}" "/tmp/session_payload_end.json"

      - name: Append RUN legacy
        if: always()
        run: python scripts/session_append.py "${SESSION_MONTH}" "/tmp/session_payload_legacy.json"

      ###################################################
      # Rollups
      ###################################################

      - name: Rollup monthly index
        if: always()
        run: python scripts/session_rollup.py "${SESSION_MONTH}" "${SESSION_DAY}"

      - name: SNAP rebuild
        if: always()
        continue-on-error: true
        run: python scripts/snap_index_rebuild.py "${SESSION_MONTH}" || true

      - name: SNAP auto cull
        if: always()
        continue-on-error: true
        run: python scripts/snap_auto_cull.py "${SESSION_MONTH}" --keep-per-day 3 --keep-per-month 30 || true

      - name: Evidence index build
        if: always()
        continue-on-error: true
        run: python scripts/evidence_index_build.py "${SESSION_MONTH}" || true

      ###################################################
      # Phase A Manifest ⭐⭐⭐⭐⭐
      ###################################################

      - name: Generate manifest.sha256
        if: always()
        env:
          RTS_MONTH: ${{ env.SESSION_MONTH }}
        run: python scripts/manifest_month.py

      - name: Verify manifest.sha256
        if: always()
        env:
          RTS_MONTH: ${{ env.SESSION_MONTH }}
        run: python scripts/verify_manifest.py

      ###################################################
      # Commit outputs (single push)
      ###################################################

      - name: Commit outputs
        if: always()
        run: |
          set -e

          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"

          git add analysis/ || true
          git add sessions/ || true
          git add incidents/evidence_snapshots/ || true

          if git diff --cached --quiet; then
            echo "No outputs changed."
            exit 0
          fi

          git commit -m "RTS: outputs update (${SESSION_MONTH})" || true

          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "push ok"
              exit 0
            fi
            sleep 2
          done

          echo "push failed"
          exit 1
