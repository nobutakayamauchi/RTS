name: Apply PR 228 Integration Bundle

on:
  push:
    branches:
      - feature/cross-repo-asset-manifest-v1
    paths:
      - integration_bundle.b64
      - .github/workflows/apply-pr228-integration.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.repository == 'nobutakayamauchi/RTS' && github.ref == 'refs/heads/feature/cross-repo-asset-manifest-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified local bundle
        run: |
          base64 --decode integration_bundle.b64 > /tmp/pr228-integration.tar.gz
          tar -xzf /tmp/pr228-integration.tar.gz -C .
          rm integration_bundle.b64 .github/workflows/apply-pr228-integration.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Register governed loop decomposition and complete asset manifest child"
          git push origin HEAD:feature/cross-repo-asset-manifest-v1
