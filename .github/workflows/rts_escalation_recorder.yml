name: RTS Escalation Recorder

on:
  workflow_run:
    workflows:
      - "RTS Sentinel Analyze"
      - "RTS Issue -> Incident File"
      - "RTS Issue Close -> Incident Close"
      # ここに「監視したい本命だけ」追加していく
    types: [completed]

permissions:
  contents: write

# 同時実行で競合して push 失敗しないようにする（超重要）
concurrency:
  group: rts-escalation-recorder
  cancel-in-progress: true

jobs:
  record_escalation:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # ✅ ここが「pages build拾わない」キモ
    # github-pages[bot] 由来は全部無視（Pagesの連鎖を断ち切る）
    if: >
      github.event.workflow_run.conclusion != 'success' &&
      github.event.workflow_run.conclusion != 'skipped' &&
      github.event.workflow_run.actor.login != 'github-pages[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Record Evidence Pack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

          # workflow_run から拾う
          TARGET_WORKFLOW: ${{ github.event.workflow_run.name }}
          TARGET_RUN_ID: ${{ github.event.workflow_run.id }}
          TARGET_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          TARGET_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TARGET_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TARGET_ACTOR: ${{ github.event.workflow_run.actor.login }}

          # 検知チューニング（安全側）
          WINDOW_N: "10"
          FAIL_THRESHOLD_LAST_N: "3"
          BURST_MINUTES: "10"
          BURST_FAIL_THRESHOLD: "2"

          # ✅ 重要ワークフロー限定（保険）
          IMPORTANT_ONLY: "true"
          IMPORTANT_WORKFLOWS: "RTS Sentinel Analyze,RTS Issue -> Incident File,RTS Issue Close -> Incident Close"

        run: |
          python scripts/rts_escalation.py

      - name: Commit Evidence Pack
        run: |
          git config user.name "rts-bot"
          git config user.email "rts-bot@users.noreply.github.com"

          git add incidents/evidence_snapshots || true

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "RTS: escalation evidence pack"
          git pull --rebase
          git push
