name: RTS Escalation Recorder

on:
  workflow_run:
    workflows:
      - "RTS Sentinel Analyze"
      - "pages build and deployment"
      - "RTS Heartbeat (Lightweight)"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: rts-escalation-recorder-main
  cancel-in-progress: true

jobs:
  escalation:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Record failure evidence (snapshot freeze)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

          TARGET_WORKFLOW: ${{ github.event.workflow_run.name }}
          TARGET_RUN_ID: ${{ github.event.workflow_run.id }}
          TARGET_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          TARGET_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          TARGET_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TARGET_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          TARGET_ACTOR: ${{ github.event.workflow_run.actor.login }}

          # ---- knobs (まずは緩め推奨) ----
          WINDOW_N: "12"
          FAIL_THRESHOLD_LAST_N: "3"
          BURST_MINUTES: "30"
          BURST_FAIL_THRESHOLD: "3"

          IMPORTANT_ONLY: "false"
          IMPORTANT_WORKFLOWS: "RTS Sentinel Analyze,pages build and deployment,RTS Heartbeat (Lightweight)"
        run: |
          python scripts/rts_escalation.py

      - name: Commit evidence to branch (safe)
        run: |
          set -e
          git config user.name "rts-bot"
          git config user.email "rts-bot@users.noreply.github.com"

          git add incidents/evidence_packs incidents/evidence_snapshots || true

          # 変更がないなら終了
          if git diff --cached --quiet; then
            echo "[ok] no changes"
            exit 0
          fi

          git commit -m "RTS: escalation evidence pack (snapshot freeze)" || exit 0

      - name: Create or update PR (escalation evidence)
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: rts-bot/escalation
          delete-branch: true
          title: "RTS: escalation evidence pack (snapshot freeze)"
          body: |
            Automated escalation evidence update.
            main is protected, so this workflow opens/updates a PR instead of pushing directly.
          commit-message: "RTS: escalation evidence pack (snapshot freeze)"
          labels: rts-bot, automated
