name: RTS Heartbeat (Lightweight)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: rts-heartbeat-main
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append heartbeat line (always)
        run: |
          mkdir -p logs
          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") heartbeat" >> logs/heartbeat.log

      - name: Commit heartbeat (safe)
        run: |
          git config user.name "rts-bot"
          git config user.email "rts-bot@users.noreply.github.com"

          git add logs/heartbeat.log || true

          if git diff --cached --quiet; then
            echo "[ok] no changes"
            exit 0
          fi

          git commit -m "RTS: heartbeat" || exit 0

          # fetch-first問題の根治
          git pull --rebase origin main
          git push origin HEAD:main
