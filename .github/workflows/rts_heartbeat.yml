name: RTS Heartbeat (Lightweight)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: rts-heartbeat-main
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append heartbeat line
        run: |
          mkdir -p logs
          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") heartbeat" >> logs/heartbeat.log

      - name: Commit to branch
        run: |
          set -e
          git config user.name "rts-bot"
          git config user.email "rts-bot@users.noreply.github.com"

          BRANCH="rts/heartbeat"

          git checkout -B $BRANCH

          git add logs/heartbeat.log || true

          git diff --cached --quiet && exit 0

          git commit -m "RTS: heartbeat"

          git push origin $BRANCH --force

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: rts/heartbeat
          base: main
          title: "RTS: Heartbeat update"
          body: "Automated heartbeat log update."
          commit-message: "RTS: heartbeat"
          delete-branch: false
