name: RTS Heartbeat (Lightweight)

on:
  workflow_dispatch:
  schedule:
    # every 30 minutes
    - cron: "*/30 * * * *"

# 同時実行を止める（競合の根本対策）
concurrency:
  group: rts-heartbeat-main
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Heartbeat snapshot (no commit)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF:  ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          utc_now="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          jst_now="$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M:%S%z')"

          # repo HEAD sha を軽く取得（監視用・書き込み無し）
          head_json="$(curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/commits/${REF#refs/heads/}")" || head_json="{}"
          head_sha="$(echo "$head_json" | python -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha','unknown'))" 2>/dev/null || echo unknown)"

          echo "UTC: $utc_now"
          echo "JST: $jst_now"
          echo "REPO: $REPO"
          echo "REF: $REF"
          echo "HEAD_SHA: $head_sha"
          echo "RUN: #$RUN_NUMBER ($RUN_ID)"
          echo "ACTOR: $ACTOR"

          {
            echo "## RTS Heartbeat (no commit)"
            echo ""
            echo "- utc_now: \`$utc_now\`"
            echo "- jst_now: \`$jst_now\`"
            echo "- repo: \`$REPO\`"
            echo "- ref: \`$REF\`"
            echo "- head_sha: \`$head_sha\`"
            echo "- run: \`#$RUN_NUMBER ($RUN_ID)\`"
            echo "- actor: \`$ACTOR\`"
            echo ""
            echo "> This heartbeat does **not** write to the repository."
          } >> "$GITHUB_STEP_SUMMARY"
