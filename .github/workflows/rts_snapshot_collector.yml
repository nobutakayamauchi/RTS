name: RTS Snapshot Collector (Level2)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rts-snapshot-collector-main
  cancel-in-progress: true

jobs:

  snapshot:

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      ###############################################################
      # Snapshot Collector (INLINE PYTHON)
      ###############################################################

      - name: Run Snapshot Collector
        run: |

          python << 'PYTHON'

          import os
          import json
          import hashlib
          import datetime

          base="incidents/evidence_snapshots"

          os.makedirs(base,exist_ok=True)

          now=datetime.datetime.utcnow().strftime("%Y%m%d_%H%M%S")

          filename=f"SNAP_{now}.bin"

          path=os.path.join(base,filename)

          payload={
            "created_at":now,
            "actor":"rts-bot",
            "type":"snapshot"
          }

          data=json.dumps(payload,indent=2).encode()

          with open(path,"wb") as f:
              f.write(data)

          sha=hashlib.sha256(data).hexdigest()

          print("Snapshot created:",path)
          print("sha256:",sha)

          PYTHON

      ###############################################################
      # SAFE COMMIT (NO REBASE)
      ###############################################################

      - name: Commit evidence
        run: |

          git config user.name "rts-bot"
          git config user.email "actions@github.com"

          git add incidents/evidence_snapshots || true

          git commit -m "RTS Snapshot Collector auto snapshot" || echo "No changes"

          git push
