import os
import re
import hashlib
import urllib.request
from datetime import datetime, timezone, timedelta

ROOT = os.getcwd()

PACK_DIR = "incidents/evidence_packs"
SNAPSHOT_DIR = "incidents/evidence_snapshots"

JST = timezone(timedelta(hours=9))


def now_jst_compact() -> str:
    return datetime.now(JST).strftime("%Y%m%d_%H%M%S")


def sha256_bytes(data: bytes) -> str:
    h = hashlib.sha256()
    h.update(data)
    return h.hexdigest()


def extract_urls(text: str) -> list[str]:
    return re.findall(r"https?://[^\s)]+", text)


def download(url: str) -> bytes:
    req = urllib.request.Request(
        url,
        headers={"User-Agent": "RTS-SnapshotCollector"},
    )
    with urllib.request.urlopen(req, timeout=25) as r:
        return r.read()


def save_snapshot(content: bytes) -> str:
    os.makedirs(SNAPSHOT_DIR, exist_ok=True)
    ts = now_jst_compact()
    filename = f"SNAP_{ts}.bin"
    path = os.path.join(SNAPSHOT_DIR, filename)
    with open(path, "wb") as f:
        f.write(content)
    return path


def has_frontmatter_field(text: str, key: str) -> bool:
    # only checks inside the first frontmatter block
    if not text.startswith("---"):
        return False
    end = text.find("\n---", 3)
    if end == -1:
        return False
    fm = text[: end + 4]
    return re.search(rf"^{re.escape(key)}\s*:", fm, flags=re.MULTILINE) is not None


def upsert_frontmatter(pack_text: str, updates: dict[str, str]) -> str:
    if not pack_text.startswith("---"):
        return pack_text

    end = pack_text.find("\n---", 3)
    if end == -1:
        return pack_text

    fm = pack_text[0 : end + 4]
    rest = pack_text[end + 4 :]

    lines = fm.splitlines(keepends=True)

    def set_key(lines_in: list[str], k: str, v: str) -> list[str]:
        pat = re.compile(rf"^{re.escape(k)}\s*:\s*(.*)$")
        out = []
        replaced = False
        for ln in lines_in:
            if pat.match(ln.strip("\n")):
                out.append(f"{k}: {v}\n")
                replaced = True
            else:
                out.append(ln)
        if not replaced:
            # insert before closing ---
            insert_at = len(out) - 1
            out = out[:insert_at] + [f"{k}: {v}\n"] + out[insert_at:]
        return out

    for k, v in updates.items():
        lines = set_key(lines, k, v)

    return "".join(lines) + rest


def process_pack(pack_path: str) -> None:
    with open(pack_path, "r", encoding="utf-8") as f:
        text = f.read()

    # already has snapshot -> skip (prevents duplication)
    if has_frontmatter_field(text, "snapshot_ref") and has_frontmatter_field(text, "snapshot_hash_sha256"):
        return

    urls = extract_urls(text)
    if not urls:
        return

    url = urls[0]

    try:
        data = download(url)
    except Exception as e:
        print("[download fail]", url, e)
        return

    snapshot_path = save_snapshot(data)
    h = sha256_bytes(data)

    updated = upsert_frontmatter(
        text,
        {
            "snapshot_ref": snapshot_path,
            "snapshot_hash_sha256": h,
            "retrieved_at": datetime.now(JST).isoformat(),
            "evidence_level": "2",
        },
    )

    with open(pack_path, "w", encoding="utf-8") as f:
        f.write(updated)

    print("[ok] snapshot saved:", snapshot_path, "->", os.path.basename(pack_path))


def main() -> None:
    if not os.path.exists(PACK_DIR):
        return

    for name in sorted(os.listdir(PACK_DIR)):
        if not name.endswith(".md"):
            continue
        process_pack(os.path.join(PACK_DIR, name))


if __name__ == "__main__":
    main()
