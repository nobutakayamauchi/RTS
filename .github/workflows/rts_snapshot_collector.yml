name: RTS Snapshot Collector (Level2)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes

permissions:
  contents: write

concurrency:
  group: rts-snapshot-collector-main
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Snapshot Collector (create snapshots)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # ここで対象を絞りたいなら使う（空なら全パック走査）
          PACK_DIR: incidents/evidence_packs
          SNAPSHOT_DIR: incidents/evidence_snapshots
        run: |
          python scripts/rts_snapshot_collector.py

      - name: Link snapshots into incidents (write refs back)
        run: |
          # collector側で incidents を更新していない場合の保険（任意）
          # 何もしないなら安全に通す
          echo "link step: handled by collector (if implemented)"

      - name: Commit evidence
        run: |
          git config user.name "rts-bot"
          git config user.email "rts-bot@users.noreply.github.com"

          git add incidents/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "RTS snapshot evidence update"
          git push
