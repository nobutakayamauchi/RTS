name: RTS Snapshot Collector (Level2)

on:
  workflow_dispatch:
  schedule:
    # every 30 minutes
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: rts-snapshot-collector-main
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run snapshot collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python scripts/rts_snapshot_collector.py

      - name: Commit snapshots (if any)
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          # configure bot identity
          git config user.name "rts-bot"
          git config user.email "rts-bot@users.noreply.github.com"

          # if no changes, exit cleanly
          if git diff --quiet && git diff --cached --quiet; then
            echo "[ok] no changes"
            exit 0
          fi

          git add -A
          git commit -m "RTS: snapshot collector (run ${RUN_ID})"

      - name: Push (rebase + retry)
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # If the previous step made no commit, this step will have nothing to push.
          # Still safe to run.
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${BRANCH}" || true
            if git push origin "HEAD:${BRANCH}"; then
              echo "[ok] pushed"
              exit 0
            fi
            echo "[warn] push failed, retry ${i}/5"
            sleep $((i*2))
          done

          echo "[error] failed to push after retries"
          exit 1
