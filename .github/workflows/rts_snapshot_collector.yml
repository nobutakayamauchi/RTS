name: RTS Snapshot Collector (Level2)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: rts-snapshot-collector-main
  cancel-in-progress: true

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ① Snapshotを作る（URL抽出→取得→incidents/evidence_snapshots/へ保存）
      - name: Run Snapshot Collector (create snapshots)
        run: |
          python -V
          python scripts/rts_snapshot_collector.py

      # ② Snapshotのsha256を計算して、INC_*.md の frontmatter に
      #    snapshot_ref / snapshot_hash_sha256 を書き戻す（Level2完成）
      - name: Link snapshots into incidents (write ref + hash)
        run: |
          python scripts/rts_snapshot_linker.py

      # ③ push競合を避けて main を取り込み→commit→push
      - name: Commit evidence
        run: |
          git config user.name "rts-bot"
          git config user.email "rts-bot@users.noreply.github.com"

          git add incidents/evidence_snapshots incidents/INC_*.md || true

          if git diff --cached --quiet; then
            echo "[skip] nothing to commit"
            exit 0
          fi

          git pull --rebase origin main
          git commit -m "RTS: snapshot level2 (collector+linker)"
          git push origin main
