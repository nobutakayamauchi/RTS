name: RTS Snapshot Collector (Level2)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rts-snapshot-collector-main
  cancel-in-progress: true

jobs:

  snapshot:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------- SNAPSHOT CREATE --------

      - name: Run Snapshot Collector
        run: python scripts/rts_snapshot_collector.py

      # -------- HASH WRITE --------

      - name: Write Snapshot Hash
        run: python scripts/rts_snapshot_hash_writer.py

      # -------- COMMIT --------

      - name: Commit Evidence
        run: |

          git config user.name "rts-bot"
          git config user.email "rts-bot@users.noreply.github.com"

          git add incidents/evidence_snapshots || true
          git add incidents/*.md || true

          git commit -m "RTS: snapshot + hash update" || echo "No changes"

          git pull --rebase origin main || true

          git push origin main
