name: Apply FREEZER Completion

on:
  push:
    branches:
      - fix/complete-cross-repo-asset-manifest-freezer-v1
    paths:
      - ".github/workflows/apply-freezer-completion.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/complete-cross-repo-asset-manifest-freezer-v1
          fetch-depth: 0
      - name: Restore governed records and verify
        shell: bash
        run: |
          set -euo pipefail
          cat integration_bundle.part* | base64 --decode > /tmp/freezer-completion.tar.gz
          tar -tzf /tmp/freezer-completion.tar.gz
          tar -xzf /tmp/freezer-completion.tar.gz -C .

          rm -f integration_bundle.part*
          rm -f .github/workflows/apply-freezer-completion.yml

          python -m freezer.cli reindex
          python -m asset_manifest.cli verify
          python -m freezer.cli verify
          python -m freezer.build_assessment verify
          python -B -m unittest discover -s tests -v

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete asset manifest FREEZER governance records"
          git push origin HEAD:fix/complete-cross-repo-asset-manifest-freezer-v1
