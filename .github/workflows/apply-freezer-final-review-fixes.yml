name: Apply FREEZER Final Review Fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/freezer-build-assessment-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fix default FROZEN readiness and pointer score validation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          rank_path = Path('freezer/assessment_rank.py')
          rank = rank_path.read_text(encoding='utf-8')
          rank = replace_once(
              rank,
              'and item.get("status") in {"READY", "SELECTED", "IN_PROGRESS"}\n',
              'and item.get("status") in {"FROZEN", "READY", "SELECTED", "IN_PROGRESS"}\n',
              'FROZEN readiness',
          )
          rank_path.write_text(rank, encoding='utf-8')

          store_path = Path('freezer/assessment_store.py')
          store = store_path.read_text(encoding='utf-8')
          store = replace_once(
              store,
              '''    if pointer.get("recommendation") != record["derived"]["recommendation"]:\n        raise BuildAssessmentError(f"{item_id}: assessment pointer recommendation mismatch")\n    if pointer.get("item_fingerprint") != record["item_fingerprint"]:\n''',
              '''    if pointer.get("recommendation") != record["derived"]["recommendation"]:\n        raise BuildAssessmentError(f"{item_id}: assessment pointer recommendation mismatch")\n    if pointer.get("decision_score") != record["derived"]["decision_score"]:\n        raise BuildAssessmentError(f"{item_id}: assessment pointer decision_score mismatch")\n    if pointer.get("item_fingerprint") != record["item_fingerprint"]:\n''',
              'pointer decision score validation',
          )
          store_path.write_text(store, encoding='utf-8')

          test_path = Path('tests/test_freezer_build_assessment.py')
          test = test_path.read_text(encoding='utf-8')
          new_tests = '''    def test_full_gate_is_true_for_frozen_seed_with_all_gates(self):\n        with tempfile.TemporaryDirectory() as temp_dir:\n            root = self.isolated_root(temp_dir)\n            self.mutate_current_item(root, "RTS-FRZ-000002", {"status": "FROZEN"})\n            rebuild_index(root)\n            payload = gate_payload(root, "RTS-FRZ-000002")\n            self.assertEqual(payload["status"], "FROZEN")\n            self.assertEqual(payload["recommendation"], "BUILD_NOW")\n            self.assertEqual(payload["preflight_state"], "PASS")\n            self.assertTrue(payload["wip_capacity_available"])\n            self.assertTrue(payload["selection_ready"])\n\n    def test_tampered_pointer_decision_score_is_rejected(self):\n        with tempfile.TemporaryDirectory() as temp_dir:\n            root = self.isolated_root(temp_dir)\n            pointer_path = (\n                root\n                / "freezer"\n                / "assessments"\n                / "RTS-FRZ-000002"\n                / "current.json"\n            )\n            pointer = json.loads(pointer_path.read_text(encoding="utf-8"))\n            pointer["decision_score"] += 1\n            self.write_json(pointer_path, pointer)\n            with self.assertRaisesRegex(\n                BuildAssessmentError,\n                "assessment pointer decision_score mismatch",\n            ):\n                load_current_assessment(root, "RTS-FRZ-000002")\n\n'''
          marker = '\n\nif __name__ == "__main__":\n'
          if test.count(marker) != 1:
              raise SystemExit('test insertion marker mismatch')
          test = test.replace(marker, '\n\n' + new_tests + 'if __name__ == "__main__":\n', 1)
          test_path.write_text(test, encoding='utf-8')
          PY
      - name: Rebuild and validate
        run: |
          python -m freezer.cli reindex
          python -B -m unittest discover -s tests -v
          python -m freezer.cli verify
          python -m freezer.build_assessment verify
      - name: Commit intended files only
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add freezer/assessment_rank.py freezer/assessment_store.py freezer/index freezer/manifests/manifest.sha256 tests/test_freezer_build_assessment.py
          git commit -m 'Align FREEZER gate readiness and assessment pointer checks'
          git push origin HEAD:feature/freezer-build-assessment-v1
