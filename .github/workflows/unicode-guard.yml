name: Unicode Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unicode-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run invisible unicode guard
        run: python3 scripts/check_invisible_unicode.py
