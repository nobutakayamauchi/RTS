name: RTS Autonomous Kernel

on:
  workflow_dispatch:
  schedule:
    # 15分ごと（負荷が気になるなら "0 * * * *" に）
    - cron: "*/15 * * * *"

concurrency:
  group: rts-autonomous-kernel
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  run-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # ✅ RTS KERNEL（ここが本体）
      # =========================
      - name: Run RTS Kernel (state/memory/audit)
        run: |
          set -euo pipefail
          python -V
          python radar_analysis.py

          # 1) state
          python state_engine.py

          # 2) memory (古い/未整備でも止めない)
          python memory_index.py || true

          # 3) memory index engine (これが最重要)
          python memory_index_engine.py

          # 4) audit
          python self_audit.py

      # =========================
      # ✅ AUTO RESET（ジョブ失敗時のみ）
      # =========================
      - name: Auto Reset (on failure)
        if: failure()
        env:
          RTS_RESET_THRESHOLD: "3"
          RTS_RESET_STATE_FILE: ".rts/reset_state.json"
          RTS_LOGS_DIR: "logs"
        run: |
          set -euo pipefail
          python reset_engine.py

      # =========================
      # ✅ 変更があれば commit & push
      # =========================
      - name: Commit & Push if changed
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 変更がなければ終了
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # 念のため add
          git add -A

          # addしても差分ゼロなら終了
          if git diff --cached --quiet; then
            echo "No changes after git add."
            exit 0
          fi

          git commit -m "RTS kernel: autonomous update"
          git push

      # =========================
      # ✅ 失敗したら Issue を切る
      # =========================
      - name: RTS Self Incident Report
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "RTS Autonomous Kernel Incident";
            const body = [
              "RTS Autonomous Kernel detected a failure.",
              "",
              `Time: ${new Date().toISOString()}`,
              `Actor: GitHub Actions`,
              "",
              "Action required:",
              "- Review latest workflow logs.",
              "",
              "Integrity preserved."
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["RTS", "incident"]
            });
