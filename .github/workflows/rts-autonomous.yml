name: RTS Autonomous Kernel

on:
  workflow_dispatch:
  schedule:
    # 15分ごと（負荷が気になるなら "0 * * * *"）
    - cron: "*/15 * * * *"

concurrency:
  group: rts-autonomous-kernel
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run RTS Kernel (state/memory/audit)
        run: |
          set -eux
          python -V
          python state_engine.py
          python memory_index.py
          python self_audit.py

      # ✅ 失敗したら Auto Reset
      - name: Auto Reset on failure
        if: failure()
        run: |
          set -eux
          python reset_engine.py

      # ✅ 変更があれば commit & push（成功時も失敗時も動く）
      - name: Commit & Push if changed
        if: always()
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 変更がなければ終了
          if git status --porcelain | grep -q .; then
            git add -A
            git commit -m "RTS kernel: autonomous cycle"
            git push
          else
            echo "No changes to commit."
          fi
