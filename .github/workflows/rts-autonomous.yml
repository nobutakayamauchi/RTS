name: RTS Autonomous Kernel

on:
  workflow_dispatch:
  schedule:
    # 15分ごと（負荷が気になるなら "0 * * * *" に）
    - cron: "*/15 * * * *"

concurrency:
  group: rts-autonomous-kernel
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  run-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run RTS Kernel (state/memory/audit)
  run: |
    set -euo pipefail
    python -V

    # RTS deterministic execution order
    python state_engine.py
    python memory_index.py || true
    python memory_index_engine.py
    python self_audit.py

      # ✅ ここがAUTO RESET本体：ジョブ失敗時だけ発火
      - name: Auto Reset (on failure)
        if: failure()
        env:
          RTS_RESET_THRESHOLD: "3"
          RTS_RESET_STATE_FILE: ".rts/reset_state.json"
          RTS_LOGS_DIR: "logs"
        run: |
          set -eux
          python reset_engine.py

      # ✅ 変更があれば commit & push（syntax error回避済み）
      - name: Commit & Push if changed
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep -q .; then
            git add -A
            git commit -m "RTS kernel: autonomous cycle update"
            git push
          else
            echo "No changes to commit."
          fi

      # ✅ 失敗したら Issue を切る（Resource not accessible 対策で issues:write）
      - name: RTS Self Incident Report
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "RTS Autonomous Kernel Incident";
            const body =
              `RTS Autonomous Kernel detected a failure.\n\n` +
              `Time: ${new Date().toISOString()}\n` +
              `Actor: GitHub Actions\n\n` +
              `Action required:\n- Review latest workflow logs.\n- Check logs/ and .rts/reset_state.json\n\n` +
              `Integrity preserved.\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["RTS", "incident"]
            });
