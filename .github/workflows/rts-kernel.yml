name: RTS OS Kernel

on:
  workflow_dispatch:
  schedule:
    # Every 30 minutes (UTC). JST = UTC+9
    - cron: "*/30 * * * *"

# Prevent overlapping runs (important for logs/commits)
concurrency:
  group: rts-os-kernel
  cancel-in-progress: false

# Required so the workflow can commit/push logs back to the repo
permissions:
  contents: write

jobs:
  rts_kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (if requirements.txt exists)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: RTS Kernel State Engine
        run: python state_engine.py

      - name: RTS Memory Index Update
        run: python memory_index.py

      - name: RTS Self Audit
        run: python self_audit.py

      - name: Commit RTS Kernel Logs
        run: |
          git config --global user.name "RTS Core"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Add only known output areas (safe)
          git add logs/ radar/ incidents/ evolution/ || true

          # Commit only if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "RTS Kernel: auto-cycle log update"
          git push
