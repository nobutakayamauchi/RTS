name: FREEZER Tests

on:
  pull_request:
    paths:
      - "freezer/**"
      - "asset_manifest/**"
      - "tests/test_freezer.py"
      - "tests/test_freezer_build_assessment.py"
      - "tests/test_asset_manifest.py"
      - ".github/workflows/freezer-tests.yml"
  push:
    branches:
      - main
    paths:
      - "freezer/**"
      - "asset_manifest/**"
      - "tests/test_freezer.py"
      - "tests/test_freezer_build_assessment.py"
      - "tests/test_asset_manifest.py"
      - ".github/workflows/freezer-tests.yml"

permissions:
  contents: read

jobs:
  freezer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify committed governed records
        run: |
          python -m freezer.cli verify
          python -m freezer.build_assessment verify
          python -m asset_manifest.cli verify
      - name: Fail on stale committed indexes
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          freezer_paths = [
              Path("freezer/index/items.json"),
              Path("freezer/index/priority.json"),
              Path("freezer/index/build_priority.json"),
          ]
          asset_paths = [
              Path("asset_manifest/index/repositories.json"),
              Path("asset_manifest/index/assets.json"),
              Path("asset_manifest/index/ownership.json"),
          ]

          def semantic(path):
              data = json.loads(path.read_text(encoding="utf-8"))
              data.pop("generated_at", None)
              return data

          committed_freezer = {path: semantic(path) for path in freezer_paths}
          committed_assets = {path: semantic(path) for path in asset_paths}

          subprocess.run([sys.executable, "-m", "freezer.cli", "reindex"], check=True)
          subprocess.run([sys.executable, "-m", "asset_manifest.cli", "reindex"], check=True)

          rebuilt_freezer = {path: semantic(path) for path in freezer_paths}
          rebuilt_assets = {path: semantic(path) for path in asset_paths}
          stale = [
              str(path)
              for path in freezer_paths
              if committed_freezer[path] != rebuilt_freezer[path]
          ] + [
              str(path)
              for path in asset_paths
              if committed_assets[path] != rebuilt_assets[path]
          ]
          if stale:
              print("Committed derived indexes are stale:")
              for path in stale:
                  print(f"- {path}")
              raise SystemExit(1)
          PY
      - name: Run governed-record tests
        run: python -B -m unittest discover -s tests -v
      - name: Verify rebuilt governed records
        run: |
          python -m freezer.cli verify
          python -m freezer.build_assessment verify
          python -m asset_manifest.cli verify
