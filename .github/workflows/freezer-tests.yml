name: FREEZER Tests

on:
  pull_request:
    paths:
      - "freezer/**"
      - "asset_manifest/**"
      - "tests/test_freezer.py"
      - "tests/test_freezer_build_assessment.py"
      - "tests/test_asset_manifest.py"
      - "integration_bundle.part*"
      - ".github/workflows/freezer-tests.yml"
      - ".github/workflows/apply-pr228-integration.yml"
  push:
    branches:
      - main
    paths:
      - "freezer/**"
      - "asset_manifest/**"
      - "tests/test_freezer.py"
      - "tests/test_freezer_build_assessment.py"
      - "tests/test_asset_manifest.py"
      - ".github/workflows/freezer-tests.yml"

permissions:
  contents: write

jobs:
  apply-bundle:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply integration bundle when present
        run: |
          shopt -s nullglob
          parts=(integration_bundle.part*)
          if [ ${#parts[@]} -eq 0 ]; then
            echo "No integration bundle to apply."
            exit 0
          fi
          cat "${parts[@]}" | base64 --decode > /tmp/pr228-integration.tar.gz
          tar -xzf /tmp/pr228-integration.tar.gz -C .
          rm -f integration_bundle.part* integration_bundle.b64
          rm -f .github/workflows/apply-pr228-integration.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Register governed loop decomposition and complete asset manifest child"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  freezer:
    needs: apply-bundle
    if: always() && needs.apply-bundle.result == 'success'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify committed governed records
        run: |
          python -m freezer.cli verify
          python -m freezer.build_assessment verify
          python -m asset_manifest.cli verify
      - name: Fail on stale committed indexes
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          freezer_paths = [Path("freezer/index/items.json"), Path("freezer/index/priority.json"), Path("freezer/index/build_priority.json")]
          asset_paths = [Path("asset_manifest/index/repositories.json"), Path("asset_manifest/index/assets.json"), Path("asset_manifest/index/ownership.json")]

          def semantic(path):
              data = json.loads(path.read_text(encoding="utf-8"))
              data.pop("generated_at", None)
              return data

          committed_freezer = {path: semantic(path) for path in freezer_paths}
          committed_assets = {path: semantic(path) for path in asset_paths}
          subprocess.run([sys.executable, "-m", "freezer.cli", "reindex"], check=True)
          subprocess.run([sys.executable, "-m", "asset_manifest.cli", "reindex"], check=True)
          rebuilt_freezer = {path: semantic(path) for path in freezer_paths}
          rebuilt_assets = {path: semantic(path) for path in asset_paths}
          stale = [str(path) for path in freezer_paths if committed_freezer[path] != rebuilt_freezer[path]] + [str(path) for path in asset_paths if committed_assets[path] != rebuilt_assets[path]]
          if stale:
              print("Committed derived indexes are stale:")
              for path in stale:
                  print(f"- {path}")
              raise SystemExit(1)
          PY
      - name: Run governed-record tests
        run: python -B -m unittest discover -s tests -v
      - name: Verify rebuilt governed records
        run: |
          python -m freezer.cli verify
          python -m freezer.build_assessment verify
          python -m asset_manifest.cli verify
