name: FREEZER Tests

on:
  pull_request:
    paths:
      - "freezer/**"
      - "tests/test_freezer.py"
      - "tests/test_freezer_build_assessment.py"
      - ".github/workflows/freezer-tests.yml"
  push:
    branches:
      - main
    paths:
      - "freezer/**"
      - "tests/test_freezer.py"
      - "tests/test_freezer_build_assessment.py"
      - ".github/workflows/freezer-tests.yml"

permissions:
  contents: read

jobs:
  freezer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify committed FREEZER snapshot
        run: |
          python -m freezer.cli verify
          python -m freezer.build_assessment verify
      - name: Fail on stale committed indexes
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          paths = [
              Path("freezer/index/items.json"),
              Path("freezer/index/priority.json"),
              Path("freezer/index/build_priority.json"),
          ]

          def semantic(path):
              data = json.loads(path.read_text(encoding="utf-8"))
              data.pop("generated_at", None)
              return data

          committed = {path: semantic(path) for path in paths}
          subprocess.run(
              [sys.executable, "-m", "freezer.build_assessment", "reindex"],
              check=True,
          )
          subprocess.run([sys.executable, "-m", "freezer.cli", "reindex"], check=True)
          rebuilt = {path: semantic(path) for path in paths}

          stale = [str(path) for path in paths if committed[path] != rebuilt[path]]
          if stale:
              print("Committed FREEZER indexes are stale:")
              for path in stale:
                  print(f"- {path}")
              print("Run:")
              print("  python -m freezer.build_assessment reindex")
              print("  python -m freezer.cli reindex")
              raise SystemExit(1)
          PY
      - name: Run FREEZER tests
        run: python -B -m unittest discover -s tests -v
      - name: Verify rebuilt FREEZER records
        run: |
          python -m freezer.cli verify
          python -m freezer.build_assessment verify
