name: FREEZER Tests

on:
  pull_request:
    paths:
      - "freezer/**"
      - "tests/test_freezer.py"
      - ".github/workflows/freezer-tests.yml"
  push:
    branches:
      - main
    paths:
      - "freezer/**"
      - "tests/test_freezer.py"
      - ".github/workflows/freezer-tests.yml"

permissions:
  contents: read

jobs:
  freezer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Show committed FREEZER hashes
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path
          root = Path('.')
          for path in sorted((root / 'freezer').rglob('*')):
              if not path.is_file():
                  continue
              relative = path.relative_to(root).as_posix()
              if '__pycache__' in path.parts or path.suffix == '.pyc':
                  continue
              if relative == 'freezer/manifests/manifest.sha256':
                  continue
              if relative.startswith('freezer/recall/'):
                  continue
              print(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {relative}")
          PY
      - name: Rebuild derived indexes and manifest
        run: python -m freezer.cli reindex
      - name: Run FREEZER tests
        run: python -B -m unittest discover -s tests -v
      - name: Verify FREEZER records
        run: python -m freezer.cli verify
