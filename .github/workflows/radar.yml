name: RTS AI Radar

on:

  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:

  radar:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Radar heartbeat

      run: |

        mkdir -p radar

        DATE=$(date +"%Y-%m-%d %H:%M")

        echo "- $DATE Radar active." >> radar/RADAR_DAILY.md

    - name: Commit

      run: |

        git config user.name "RTS Radar"

        git config user.email "actions@github.com"

        git add radar/RADAR_DAILY.md

        git commit -m "Radar auto log" || echo "No change"

        git push
