name: RTS AI Rada

concurrency:
  group: rts-main-writer
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    # 30分ごと（UTC基準）
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run RTS Radar
        run: |
          python vibecode/radar.py

      - name: Commit radar outputs
        run: |
          git config --global user.name "RTS Radar"
          git config --global user.email "rts-radar@users.noreply.github.com"

          git add incidents/*.md || true
          git add logs/RADAR_LOG.md || true
          git add radar/seen.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "RTS Radar: update incidents"
          git push
