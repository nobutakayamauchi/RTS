name: "RTS Incident Report"
description: "Report a safety or reliability incident (evidence-first)"
title: "INC_YYYYMMDD_HHMM__short_title"
labels: ["incident"]
assignees:
  - nobutakayamauchi

body:

  - type: markdown
    attributes:
      value: |
        ## RTS Incident Report

        Evidence-first reporting.
        No inference beyond evidence.

        Paste repository evidence links.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Short factual description.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - S0 Catastrophic systemic failure
        - S1 Production blocking
        - S2 Workflow degradation
        - S3 Minor friction
        - S4 Cosmetic
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Operational Impact
      description: Who or what was affected
      placeholder: workflow delay or manual rebuild required
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: workflow length interaction triggering actions
      placeholder: |
        1 workflow longer than 2 hours
        2 continuous GPT interaction
        3 observe context reset
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: execution conditions
      placeholder: |
        device = iPhone15Pro
        interface = Mobile GitHub Browser
        workflow = Long Session AI Operation
        model = GPT unknown
    validations:
      required: false

  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: initial explanation based on evidence only
      placeholder: context fragmentation suspected
    validations:
      required: false

  - type: textarea
    id: validation
    attributes:
      label: Validation Method
      description: how hypothesis is tested
      placeholder: reproduction experiment or controlled retry
    validations:
      required: false

  - type: textarea
    id: confirmed
    attributes:
      label: Confirmed Cause
      description: verified root cause if known
      placeholder: unconfirmed if unknown
    validations:
      required: false

  - type: textarea
    id: mitigation
    attributes:
      label: RTS Intervention
      description: operator response actions
      placeholder: execution logging initiated workflow isolation rollback
    validations:
      required: false

  - type: textarea
    id: recovery
    attributes:
      label: Recovery
      description: mitigation outcome
      placeholder: manual audit completed workflow rebuilt
    validations:
      required: false

  - type: textarea
    id: lessons
    attributes:
      label: Lessons Learned
      description: operational learning extracted
      placeholder: persistent execution logging stabilizes workflow continuity
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: Evidence Required
      description: first party or third party evidence
      placeholder: |
        source_type = third_party
        url = https://example.com

        retrieved_at = YYYY-MM-DDTHHMM

        snapshot_path = incidents/evidence_snapshots/example.md

        content_hash = SHA256_PENDING
    validations:
      required: true

  - type: input
    id: operator
    attributes:
      label: Operator Handle
      placeholder: "@operator_handle"
    validations:
      required: true
