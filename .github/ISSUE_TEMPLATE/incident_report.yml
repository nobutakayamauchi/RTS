name: "RTS Incident Report"
description: "Report an incident (evidence-first, audit-grade)."
title: "INC_YYYYMMDD_HHMM__short_title"
labels: ["incident"]
assignees:
  - nobutakayamauchi

body:
  - type: markdown
    attributes:
      value: |
        ## RTS Incident Report

        Evidence-first. No inference beyond evidence.
        Use this form to generate audit-grade incident records.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? (facts only)
      placeholder: "Short factual description."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: S0 catastrophic / S1 blocking / S2 degradation / S3 minor / S4 cosmetic
      options:
        - S0
        - S1
        - S2
        - S3
        - S4
    validations:
      required: true

  - type: dropdown
    id: lifecycle_state
    attributes:
      label: Lifecycle State
      description: Where is this incident in the operational state machine?
      options:
        - INCIDENT
        - INVESTIGATION
        - INTERVENTION
        - RECOVERY
        - KNOWLEDGE
    validations:
      required: true

  - type: textarea
    id: operational_impact
    attributes:
      label: Operational Impact
      description: Who/what was affected? What broke or was at risk?
      placeholder: "workflow delay / manual rebuild required / decision risk introduced"
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction Steps
      description: Minimum: (1) workflow length (2) interaction type (3) triggering actions. If unknown, say 'Reproduction unknown.'
      placeholder: |
        1) workflow longer than 2 hours
        2) continuous GPT interaction
        3) observe context reset
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Execution conditions (device / interface / workflow / etc.)
      placeholder: |
        device = iPhone15Pro
        interface = Mobile GitHub Browser
        workflow = Long Session AI Operation
        model = GPT (unknown version)
    validations:
      required: false

  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: Initial explanation based on available evidence (avoid definitive claims).
      placeholder: "context fragmentation suspected"
    validations:
      required: false

  - type: textarea
    id: validation_method
    attributes:
      label: Validation Method
      description: How will you test the hypothesis?
      placeholder: "reproduction experiment / controlled retry / vendor confirmation"
    validations:
      required: false

  - type: textarea
    id: confirmed_cause
    attributes:
      label: Confirmed Cause
      description: Verified root cause (if unknown, write 'Unconfirmed.')
      placeholder: "Unconfirmed."
    validations:
      required: false

  - type: textarea
    id: rts_intervention
    attributes:
      label: RTS Intervention
      description: Operator response actions (facts only).
      placeholder: "execution logging initiated / workflow isolation / rollback"
    validations:
      required: false

  - type: textarea
    id: recovery
    attributes:
      label: Recovery
      description: Mitigation outcome.
      placeholder: "manual audit completed / workflow rebuilt"
    validations:
      required: false

  - type: textarea
    id: lessons_learned
    attributes:
      label: Lessons Learned
      description: Operational learning extracted.
      placeholder: "persistent execution logging stabilizes workflow continuity"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## Evidence v3 (Required)

        Evidence is valid if it has:
        - provenance (source + time)
        - integrity (hash)
        - reference (url or internal path)

        RTS uses two evidence streams:
        (1) first-party operational logs (execution + memory index)
        (2) third-party evidence links attached to incidents

  - type: dropdown
    id: evidence_source_type
    attributes:
      label: Evidence Source Type
      description: first_party = RTS repo logs / third_party = external source
      options:
        - first_party
        - third_party
    validations:
      required: true

  - type: input
    id: evidence_url
    attributes:
      label: Evidence URL (third_party only)
      description: If third_party, paste the URL. If first_party, leave blank.
      placeholder: "https://x.com/... or https://example.com"
    validations:
      required: false

  - type: input
    id: retrieved_at
    attributes:
      label: Retrieved At (ISO8601)
      description: When you referenced/captured the evidence.
      placeholder: "2026-02-24T08:08:00+09:00"
    validations:
      required: true

  - type: input
    id: content_hash
    attributes:
      label: Content Hash (sha256)
      description: sha256 of the captured content (or snapshot file content).
      placeholder: "sha256:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
    validations:
      required: true

  - type: input
    id: snapshot_path
    attributes:
      label: Snapshot Path (optional)
      description: Repo path to stored snapshot (recommended).
      placeholder: "incidents/evidence_snapshots/INC_YYYYMMDD_HHMM_xxx_snapshot.md"
    validations:
      required: false

  - type: dropdown
    id: detection_source
    attributes:
      label: Detection Source
      description: Who/what detected it first?
      options:
        - operator
        - automation
        - public_report
        - vendor_notice
    validations:
      required: true

  - type: input
    id: operator_handle
    attributes:
      label: Operator Handle
      description: GitHub/X handle (no secrets).
      placeholder: "@operator_handle"
    validations:
      required: true
