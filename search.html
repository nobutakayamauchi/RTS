<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RTS Search</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 16px; }
    input { width: 100%; padding: 12px; font-size: 16px; }
    .hint { color: #666; margin-top: 8px; }
    .item { padding: 12px 0; border-bottom: 1px solid #eee; }
    .title { font-weight: 700; }
    .meta { color: #666; font-size: 12px; margin-top: 4px; }
    .text { margin-top: 6px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>RTS Search</h1>
  <input id="q" placeholder="検索（例: incident / genesis / kernel）" autocomplete="off" />
  <div class="hint">対象: search_index.json（まずはMVPで1件）</div>
  <div id="result"></div>

  <script>
    let docs = [];
    const $q = document.getElementById("q");
    const $result = document.getElementById("result");

    function escapeHtml(s){
      return (s||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function render(items){
      if (!items.length) { $result.innerHTML = "<p class='hint'>該当なし</p>"; return; }
      $result.innerHTML = items.map(d => `
        <div class="item">
          <div class="title"><a href="${escapeHtml(d.url)}">${escapeHtml(d.title)}</a></div>
          <div class="meta">${escapeHtml(d.id)}</div>
          <div class="text">${escapeHtml(d.text).slice(0, 240)}...</div>
        </div>
      `).join("");
    }

    function search(query){
      const q = (query||"").trim().toLowerCase();
      if (!q) { render(docs); return; }
      const terms = q.split(/\s+/).filter(Boolean);
      const hits = docs.filter(d => {
        const hay = (d.title + " " + d.text + " " + d.id).toLowerCase();
        return terms.every(t => hay.includes(t));
      });
      render(hits);
    }

    fetch("search_index.json")
      .then(r => r.json())
      .then(json => {
        docs = json;
        render(docs);
        $q.addEventListener("input", e => search(e.target.value));
      })
      .catch(err => {
        $result.innerHTML = "<p class='hint'>search_index.json の読み込みに失敗</p>";
        console.error(err);
      });
  </script>
</body>
</html>
